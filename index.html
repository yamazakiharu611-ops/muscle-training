<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Tracker</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #777777;
            --primary: #3498db;
            --primary-hover: #2980b9;
            --success: #2ecc71;
            --success-hover: #27ae60;
            --border: #e1e4e8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 28px;
            color: #2c3e50;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }

        .card-full {
            grid-column: 1 / -1;
        }

        .card h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 18px;
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 10px;
            color: #2c3e50;
        }

        .input-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .input-group {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-muted);
        }

        input, select {
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            background: #fcfcfc;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-success {
            background-color: var(--success);
            color: white;
            width: auto;
            padding: 8px 16px;
            font-size: 13px;
            float: right;
            margin-bottom: 15px;
        }

        .btn-success:hover {
            background-color: var(--success-hover);
        }

        .target-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            text-align: center;
        }

        .target-item {
            background: var(--bg-color);
            padding: 12px;
            border-radius: 6px;
        }

        .target-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .target-value {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
        }

        .table-wrapper {
            overflow-x: auto;
            width: 100%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            background-color: var(--bg-color);
            color: var(--text-muted);
            font-weight: 600;
        }

        tr:hover td {
            background-color: #fcfcfc;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>🏋️ Workout Tracker</h1>
        </header>

        <div class="dashboard">
            <!-- 体型・目標カード (oninputを追加して、入力の瞬間に確実にJSを動かす) -->
            <div class="card">
                <h2>マイデータ & 目標設定</h2>
                <div class="input-row">
                    <div class="input-group">
                        <label>身長 (cm)</label>
                        <input type="number" id="height" value="170" step="0.1" oninput="calculateTargets()">
                    </div>
                    <div class="input-group">
                        <label>体重 (kg)</label>
                        <input type="number" id="weight" value="65" step="0.1" oninput="calculateTargets()">
                    </div>
                </div>
                
                <div class="target-grid" id="target-grid">
                    <!-- JSで動的に生成 -->
                </div>
            </div>

            <!-- 実績入力カード -->
            <div class="card">
                <h2>トレーニング記録</h2>
                <div class="input-row">
                    <div class="input-group">
                        <label>日付</label>
                        <input type="date" id="date">
                    </div>
                    <div class="input-group">
                        <label>種目名</label>
                        <select id="exercise">
                            <optgroup label="ビッグスリー">
                                <option value="ベンチプレス">ベンチプレス</option>
                                <option value="スクワット">スクワット</option>
                                <option value="デッドリフト">デッドリフト</option>
                            </optgroup>
                            <optgroup label="胸 (Chest)">
                                <option value="インクラインダンベルプレス">インクラインダンベルプレス</option>
                                <option value="ダンベルフライ">ダンベルフライ</option>
                                <option value="ディップス">ディップス</option>
                            </optgroup>
                            <optgroup label="背中 (Back)">
                                <option value="懸垂 (チンニング)">懸垂 (チンニング)</option>
                                <option value="ラットプルダウン">ラットプルダウン</option>
                                <option value="ベントオーバーロウ">ベントオーバーロウ</option>
                            </optgroup>
                            <optgroup label="肩 (Shoulders)">
                                <option value="ショルダープレス">ショルダープレス</option>
                                <option value="サイドレイズ">サイドレイズ</option>
                                <option value="リアレイズ">リアレイズ</option>
                            </optgroup>
                            <optgroup label="腕 (Arms)">
                                <option value="バーベルカール">バーベルカール</option>
                                <option value="インクラインカール">インクラインカール</option>
                                <option value="スカルクラッシャー">スカルクラッシャー</option>
                            </optgroup>
                            <optgroup label="足・臀部 (Legs)">
                                <option value="レッグプレス">レッグプレス</option>
                                <option value="レッグエクステンション">レッグエクステンション</option>
                                <option value="レッグカール">レッグカール</option>
                                <option value="ブルガリアンスクワット">ブルガリアンスクワット</option>
                            </optgroup>
                            <option value="その他">その他</option>
                        </select>
                    </div>
                </div>
                <div class="input-row">
                    <div class="input-group">
                        <label>重量 (kg)</label>
                        <input type="number" id="record-weight" value="20" step="2.5">
                    </div>
                    <div class="input-group">
                        <label>回数 (Reps)</label>
                        <input type="number" id="reps" value="10">
                    </div>
                </div>
                <button class="btn btn-primary" onclick="saveRecord()">記録を保存</button>
            </div>

            <!-- 履歴一覧カード -->
            <div class="card card-full">
                <button class="btn btn-success" onclick="downloadCSV()">📥 CSVエクスポート</button>
                <h2>トレーニング履歴</h2>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>日付</th>
                                <th>種目名</th>
                                <th>重量 (kg)</th>
                                <th>回数</th>
                                <th>推定1RM (kg)</th>
                            </tr>
                        </thead>
                        <tbody id="record-table-body">
                            <!-- JSで動的に生成 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('date').valueAsDate = new Date();

        // --- 身長と体重の両方を確実に加味する計算式 ---
        function calculateTargets() {
            const height = parseFloat(document.getElementById('height').value) || 0;
            const weight = parseFloat(document.getElementById('weight').value) || 0;

            if (height === 0 || weight === 0) return;

            // 1. 身長から適正体重(BMI 22)を計算
            const heightM = height / 100;
            const idealWeight = heightM * heightM * 22;

            // 2. 適正体重(60%) と 現在の体重(40%) をブレンド（どちらを動かしても必ず数値が変化します）
            const blendedWeight = (idealWeight * 0.6) + (weight * 0.4);

            // 3. ブレンドされた体重をベースに目標を決定
            const bench = (blendedWeight * 0.8).toFixed(1);
            const squat = (blendedWeight * 1.2).toFixed(1);
            const dead = (blendedWeight * 1.2).toFixed(1);

            const grid = document.getElementById('target-grid');
            grid.innerHTML = `
                <div class="target-item" style="grid-column: 1 / -1; background-color: #e8f6f3; border: 1px solid #a3e4d7; display: flex; justify-content: space-around; padding: 10px;">
                    <div>
                        <div class="target-label" style="color: #16a085;">理想体重 (適正)</div>
                        <div class="target-value" style="color: #16a085; font-size: 15px;">${idealWeight.toFixed(1)} kg</div>
                    </div>
                    <div style="border-left: 1px solid #a3e4d7; padding-left: 20px;">
                        <div class="target-label" style="color: #16a085;">目標計算の基準（両方加味）</div>
                        <div class="target-value" style="color: #16a085; font-size: 15px;">${blendedWeight.toFixed(1)} kg</div>
                    </div>
                </div>
                <div class="target-item"><div class="target-label">ベンチ目標</div><div class="target-value">${bench}kg</div></div>
                <div class="target-item"><div class="target-label">スクワット目標</div><div class="target-value">${squat}kg</div></div>
                <div class="target-item"><div class="target-label">デッド目標</div><div class="target-value">${dead}kg</div></div>
            `;
        }

        // 初回起動時にも実行
        calculateTargets();

        // --- データの保存・表示 ---
        const STORAGE_KEY = 'workout_records';

        function getRecords() {
            const json = localStorage.getItem(STORAGE_KEY);
            return json ? JSON.parse(json) : [];
        }

        function renderTable() {
            const records = getRecords();
            const tbody = document.getElementById('record-table-body');
            tbody.innerHTML = '';

            if (records.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:var(--text-muted);">記録がありません</td></tr>`;
                return;
            }

            [...records].reverse().forEach(r => {
                const rmVal = r.rm ? parseFloat(r.rm).toFixed(1) : (r.weight * (1 + r.reps / 30)).toFixed(1);
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${r.date}</td><td>${r.exercise}</td><td>${r.weight} kg</td><td>${r.reps} 回</td><td style="font-weight:bold; color:#2c3e50;">${rmVal} kg</td>`;
                tbody.appendChild(tr);
            });
        }

        function saveRecord() {
            const date = document.getElementById('date').value;
            const exercise = document.getElementById('exercise').value;
            const weight = parseFloat(document.getElementById('record-weight').value);
            const reps = parseInt(document.getElementById('reps').value);

            if(!date || isNaN(weight) || isNaN(reps)) return;

            const rm = reps === 1 ? weight : weight * (1 + reps / 30);
            const calculatedRm = parseFloat(rm.toFixed(1));

            const records = getRecords();
            records.push({ date, exercise, weight, reps, rm: calculatedRm });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
            
            renderTable();
        }

        renderTable();

        // --- CSVエクスポート ---
        function downloadCSV() {
            const records = getRecords();
            if(records.length === 0) return;

            let csv = "日付,種目名,重量(kg),回数,推定1RM(kg)\n";
            records.forEach(r => { 
                const rmVal = r.rm ? r.rm : (r.weight * (1 + r.reps / 30)).toFixed(1);
                csv += `${r.date},${r.exercise},${r.weight},${r.reps},${rmVal}\n`; 
            });

            const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "workout_records.csv";
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
