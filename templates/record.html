{% extends 'layout.html' %}
{% block content %}
<h2>筋トレ実績を記録</h2>
<form method="POST">
    <label>日付</label>
    <input type="date" name="date" value="{{ today }}" required>

    <label>身長 (cm)</label>
    <input type="number" step="0.1" name="height" placeholder="例: 170.5" required>

    <label>体重 (kg) = 扱う重量</label>
    <input type="number" step="0.1" name="weight" placeholder="例: 65.0" required>

    <label>部位</label>
    <select name="part" id="part-select" onchange="updateExercises()" required>
        {% for part in exercise_data.keys() %}
            <option value="{{ part }}">{{ part }}</option>
        {% endfor %}
    </select>

    <label>種目</label>
    <select name="exercise" id="exercise-select" required></select>

    <label>回数 (レップ数)</label>
    <input type="number" name="reps" placeholder="例: 10" required>

    <button type="submit">この実績を保存する</button>
</form>

<hr>
<h3>✨ 新種目を追加</h3>
<form method="POST" style="background-color: #f9f9f9; padding: 15px; border-radius: 5px;">
    <label>部位</label>
    <select name="new_part">
        {% for part in exercise_data.keys() %}<option value="{{ part }}">{{ part }}</option>{% endfor %}
    </select>
    <label>種目名</label>
    <input type="text" name="new_exercise" required>
    <button type="submit" name="add_exercise" class="btn-secondary">＋ 追加</button>
</form>

<script>
const exerciseData = {{ exercise_data | tojson }};
function updateExercises() {
    const part = document.getElementById('part-select').value;
    const select = document.getElementById('exercise-select');
    select.innerHTML = '';
    exerciseData[part].forEach(ex => {
        const opt = document.createElement('option');
        opt.value = ex; opt.textContent = ex;
        select.appendChild(opt);
    });
}
window.onload = updateExercises;
</script>
{% endblock %}
