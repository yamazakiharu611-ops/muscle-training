<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>筋トレ記録管理システム Pro</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f5f5f5; color: #333; }
        nav { margin-bottom: 20px; background-color: #333; padding: 10px; border-radius: 5px; }
        nav a { color: white; margin-right: 15px; text-decoration: none; font-weight: bold; }
        nav a:hover { text-decoration: underline; }
        .container { background-color: white; padding: 20px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { border-left: 5px solid #007bff; padding-left: 10px; }
        input, select, button { padding: 8px; margin: 5px 0 15px 0; display: block; width: 100%; max-width: 400px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        .btn-secondary { background-color: #28a745; }
        .btn-secondary:hover { background-color: #218838; }
        hr { border: 0; height: 1px; background: #ccc; margin: 20px 0; }
    </style>
</head>
<body>
    <nav>
        <a href="/">履歴を見る</a>
        <a href="/record">記録する</a>
        <a href="/calculate">目標を計算する</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
